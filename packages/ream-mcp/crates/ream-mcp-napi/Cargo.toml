[package]
name = "ream-mcp-napi"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "NAPI bindings for Ream MCP. Thin wrapper around `ream-mcp-core`."

[lib]
crate-type = ["cdylib"]

[dependencies]
ream-mcp-core = { path = "../ream-mcp-core" }
napi = { version = "2", default-features = false, features = ["napi8"] }
napi-derive = "2"
serde_json = "1"
once_cell = "1"

[build-dependencies]
napi-build = "2"
