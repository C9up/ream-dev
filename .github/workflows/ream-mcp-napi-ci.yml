name: ream-mcp-napi-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm_overwrite:
        description: 'Type YES to override the drift gate (force-publish even if registry version >= package.json version). Use only for rollback scenarios.'
        required: false
        default: 'no'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/ream-mcp
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    suffix: linux-x64-gnu }
          - { os: ubuntu-24.04-arm, suffix: linux-arm64-gnu }
          - { os: macos-13,         suffix: darwin-x64 }
          - { os: macos-14,         suffix: darwin-arm64 }
          - { os: windows-latest,   suffix: win32-x64-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install
      - run: pnpm build:napi
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ream-mcp-napi-${{ matrix.suffix }}
          path: |
            packages/ream-mcp/index.${{ matrix.suffix }}.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-test]
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: packages/ream-mcp
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify NPM_TOKEN secret
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret missing — set in repo settings before manual publish"
            exit 1
          fi
      - name: Tag-vs-package.json gate
        run: |
          tag=$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$tag" ]; then
            echo "::error::HEAD has no v<X.Y.Z>-shaped tag — refuse to publish from an untagged commit"
            exit 1
          fi
          pkg_v=$(node -p "require('./package.json').version")
          if [ "$tag" != "v${pkg_v}" ]; then
            echo "::error::Tag $tag does not match package.json v${pkg_v}"
            exit 1
          fi
      - name: Drift fail-closed gate
        env:
          CONFIRM_OVERWRITE: ${{ inputs.confirm_overwrite }}
        run: |
          local_v=$(node -p "require('./package.json').version")
          npm_err=$(mktemp)
          npm_v=$(npm view --fetch-timeout=30000 @c9up/ream-mcp version 2>"$npm_err")
          status=$?; err=$(cat "$npm_err"); rm -f "$npm_err"
          if [ "$status" -ne 0 ]; then
            if echo "$err" | grep -qE 'E404|404 Not Found'; then npm_v=""; else
              echo "::error::npm registry unreachable: $err"; exit 1; fi
          fi
          if [ -z "$npm_v" ]; then echo "First publish ($local_v)"; exit 0; fi
          if [ "$local_v" = "$npm_v" ] && [ "$CONFIRM_OVERWRITE" != "YES" ]; then
            echo "::error::$local_v already published — confirm_overwrite=YES required"; exit 1
          fi
          highest=$(printf '%s\n%s\n' "$npm_v" "$local_v" | sort -V | tail -1)
          if [ "$highest" = "$npm_v" ] && [ "$local_v" != "$npm_v" ] && [ "$CONFIRM_OVERWRITE" != "YES" ]; then
            echo "::error::Registry $npm_v > local $local_v — refuse rollback without confirm_overwrite=YES"; exit 1
          fi
      - run: pnpm install
      - uses: actions/download-artifact@v4
        with:
          pattern: ream-mcp-napi-*
          merge-multiple: true
          path: packages/ream-mcp
      - run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
