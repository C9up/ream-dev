name: ream-mcp-ci

on:
  push:
    branches: [main]
    paths: ['packages/ream-mcp/**', '.github/workflows/ream-mcp-ci.yml']
  pull_request:
    branches: [main]
    paths: ['packages/ream-mcp/**', '.github/workflows/ream-mcp-ci.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Differentiated by event_name so a workflow_dispatch publish run is not
  # cancelled by a subsequent push to main mid-flight.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    suffix: linux-x64-gnu }
          - { os: ubuntu-24.04-arm, suffix: linux-arm64-gnu }
          - { os: macos-13,         suffix: darwin-x64 }
          - { os: macos-14,         suffix: darwin-arm64 }
          - { os: windows-latest,   suffix: win32-x64-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build NAPI binary
        run: pnpm --filter @c9up/ream-mcp build:napi

      - name: Vitest
        run: pnpm --filter @c9up/ream-mcp test --run tests/unit --reporter=json --outputFile=test-results.json
        shell: bash

      - name: Smoke gate — tests ran AND zero skipped (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f test-results.json ]; then
            echo "::error::test-results.json not produced — pnpm test failed before writing"
            exit 1
          fi
          total=$(jq '[.testResults[].assertionResults[]] | length' test-results.json)
          if [ "$total" -eq 0 ]; then
            echo "::error::0 tests ran — test discovery is broken (check vitest include glob)"
            exit 1
          fi
          skipped=$(jq '[.testResults[].assertionResults[] | select(.status=="skipped")] | length' test-results.json)
          if [ "$skipped" -ne 0 ]; then
            echo "::error::$skipped tests skipped — check NAPI binary load path"
            exit 1
          fi
        shell: bash

      - name: Smoke gate — tests ran AND zero skipped (Windows)
        if: runner.os == 'Windows'
        run: |
          if (-not (Test-Path test-results.json)) {
            Write-Error "test-results.json not produced — pnpm test failed before writing"
            exit 1
          }
          $total = python -c "import json,sys; d=json.load(open(sys.argv[1])); print(sum(1 for r in d['testResults'] for a in r['assertionResults']))" test-results.json
          if ([int]$total -eq 0) {
            Write-Error "0 tests ran — test discovery is broken (check vitest include glob)"
            exit 1
          }
          $skipped = python -c "import json,sys; d=json.load(open(sys.argv[1])); print(sum(1 for r in d['testResults'] for a in r['assertionResults'] if a['status']=='skipped'))" test-results.json
          if ([int]$skipped -ne 0) {
            Write-Error "$skipped tests skipped — check NAPI binary load path"
            exit 1
          }
        shell: pwsh

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ream-mcp-napi-${{ matrix.suffix }}
          path: packages/ream-mcp/index.${{ matrix.suffix }}.node
          if-no-files-found: error

  cargo-tests:
    name: Cargo tests (linux-x64-gnu)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ream-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  # Publish job — gated on workflow_dispatch (manual maintainer trigger).
  # DISABLED until Story 52.4 Decision C clears (ream-cli npm version sync) and ADR-003
